spring.datasource.url=jdbc:h2:mem:fitness_tracker_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.flyway.enabled=false

app.jwt.secret=test-jwt-secret-key-test-jwt-secret-key-123456
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000
app.auth.access-cookie-name=fitness_access_token
app.auth.refresh-cookie-name=fitness_refresh_token
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax
app.auth.refresh-cleanup-ms=3600000
