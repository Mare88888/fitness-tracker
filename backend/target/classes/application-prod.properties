spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
app.auth.access-cookie-name=${AUTH_ACCESS_COOKIE:fitness_access_token}
app.auth.refresh-cookie-name=${AUTH_REFRESH_COOKIE:fitness_refresh_token}
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:true}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cleanup-ms=${AUTH_REFRESH_CLEANUP_MS:3600000}

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.show-details=never
