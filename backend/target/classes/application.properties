spring.application.name=fitness-tracker-backend

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fitness_db}
spring.datasource.username=${DB_USERNAME:fitness}
spring.datasource.password=${DB_PASSWORD:fitness}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
