services:
  postgres:
    image: postgres:16
    container_name: fitness-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitness_db
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: fitness
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitness -d fitness_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
